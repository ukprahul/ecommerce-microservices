spring.application.name=paymentservice
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3306/paymentservice
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.baseline-on-migrate=true
server.port=9001
logging.level.org.springframework.security=trace
razorpay.key.id=${RAZORPAY_KEY_ID:test_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_razorpay_key_secret}
stripe.api.key=${STRIPE_API_KEY:test_stripe_api_key}
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/